<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>地球科學會考衝刺</title>
    <!-- 加入可愛圓潤的英文字型 Nunito 與黑體/明體 -->
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@700;900&family=Noto+Sans+TC:wght@400;700;900&family=Noto+Serif+TC:wght@600;900&display=swap" rel="stylesheet">
    
    <!-- React & ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <!-- Babel for JSX -->
    <script src="https://unpkg.com/@babel/standalone@7/babel.min.js"></script>

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- Import Map for Firebase -->
    <script type="importmap">
      {
        "imports": {
          "firebase/app": "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js",
          "firebase/firestore": "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js",
          "firebase/auth": "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js"
        }
      }
    </script>

    <style>
        :root {
            --text-main: #4e342e;
            --card-bg: #ffffff;
        }

        /* 可愛粉彩圓點背景 */
        body {
            font-family: 'Nunito', 'Noto Sans TC', sans-serif;
            background-color: #fff9f9;
            background-image: 
                radial-gradient(#ffc0cb 3px, transparent 3px), 
                radial-gradient(#a2d5f2 3px, transparent 3px);
            background-size: 40px 40px;
            background-position: 0 0, 20px 20px;
            margin: 0;
            padding: 20px;
            min-height: 100vh;
            color: var(--text-main);
        }

        h1, h2, .font-serif { font-family: 'Noto Serif TC', serif; }

        .header {
            text-align: center;
            margin-bottom: 40px;
            max-width: 1400px;
            position: relative;
        }

        /* 超可愛立體標題 - 稍微放大 */
        .header h1 {
            color: #ff6b81;
            font-size: 4.5em; 
            font-weight: 900; 
            margin-bottom: 20px;
            letter-spacing: 2px;
            text-shadow: 4px 4px 0px #ffffff, 8px 8px 0px #ffeaa7;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
        }

        /* 專為 iPad Pro 最佳化的網格: 強制橫向3排 */
        .app-grid {
            display: grid;
            grid-template-columns: repeat(1, 1fr);
            gap: 40px;
            width: 100%;
            max-width: 1400px; /* 放寬最大寬度 */
            margin-bottom: 50px;
        }
        @media (min-width: 800px) {
            .app-grid {
                grid-template-columns: repeat(2, 1fr);
            }
        }
        @media (min-width: 1024px) {
            .app-grid {
                grid-template-columns: repeat(3, 1fr); /* iPad Pro橫式3欄 */
            }
        }

        /* 圓潤泡泡風格的卡片 - 大幅放大 */
        .app-card {
            background: var(--card-bg);
            border-radius: 40px;
            padding: 35px 30px 25px 30px;
            text-decoration: none;
            color: #333;
            transition: all 0.2s cubic-bezier(0.25, 0.8, 0.25, 1);
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            position: relative;
            min-height: 420px;
        }

        .app-card:hover {
            transform: translateY(-8px);
        }

        .app-card.completed {
            transform: scale(1.02);
        }

        .card-icon-wrapper {
            font-size: 4em;
            margin-bottom: 20px;
            width: 110px;
            height: 110px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 5px solid #fff;
            box-shadow: 0 6px 15px rgba(0,0,0,0.1);
        }

        .card-title {
            font-size: 1.6em;
            font-weight: 900;
            margin-bottom: 18px;
            line-height: 1.4;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .status-dot {
            width: 14px;
            height: 14px;
            border-radius: 50%;
            display: inline-block;
            margin-right: 10px;
            border: 2px solid #fff;
        }
        .status-loading { background-color: #fdd835; box-shadow: 0 0 8px #fdd835; }
        .status-success { background-color: #4caf50; box-shadow: 0 0 8px #4caf50; }
        .status-error { background-color: #ef5350; box-shadow: 0 0 8px #ef5350; }

        @keyframes bounceIn {
            0% { opacity: 0; transform: scale(0.8); }
            50% { transform: scale(1.05); }
            100% { opacity: 1; transform: scale(1); }
        }
        .animate-bounce-in { animation: bounceIn 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; }

        /* 可愛分類大標題 */
        .section-divider-container {
            grid-column: 1 / -1;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 50px 0 40px 0;
            position: relative;
        }
        
        .section-divider {
            background: #fff;
            padding: 15px 50px;
            border-radius: 60px;
            border: 5px solid #ffeaa7;
            box-shadow: 0 8px 0 #ffeaa7;
            color: #d35400;
            font-size: 2.5em;
            font-weight: 900;
            z-index: 2;
            display: inline-flex;
            align-items: center;
            gap: 15px;
        }

        .section-divider-line {
            position: absolute;
            top: 50%;
            left: 0;
            right: 0;
            height: 6px;
            background: repeating-linear-gradient(90deg, #ffeaa7, #ffeaa7 15px, transparent 15px, transparent 30px);
            z-index: 1;
        }

        .quick-user-btn {
            display: flex;
            align-items: center;
            gap: 8px;
            background: #fff;
            border: 3px solid #ffb8b8;
            color: #d63031;
            padding: 12px 30px;
            border-radius: 50px;
            font-weight: 900;
            font-size: 1.3em;
            transition: all 0.2s;
            box-shadow: 0 4px 0 #ffb8b8;
        }
        .quick-user-btn:hover {
            transform: translateY(2px);
            box-shadow: 0 2px 0 #ffb8b8;
            background: #fff0f0;
        }
        
        /* 隱藏預設捲軸，讓介面更乾淨 */
        ::-webkit-scrollbar {
            width: 8px;
        }
        ::-webkit-scrollbar-track {
            background: #fff9f9; 
        }
        ::-webkit-scrollbar-thumb {
            background: #ffc0cb; 
            border-radius: 10px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #ff9a9e; 
        }

    </style>
</head>
<body>

    <div id="root"></div>

    <script type="text/babel" data-type="module">
        import { initializeApp } from "firebase/app";
        import { getFirestore, doc, setDoc, updateDoc, onSnapshot, arrayUnion } from "firebase/firestore";
        import { getAuth, signInAnonymously, signInWithCustomToken, onAuthStateChanged } from "firebase/auth";

        // ==========================================
        // 1. Firebase Config
        // ==========================================
        
        const firebaseConfig = {
            apiKey: "AIzaSyAxQFt76ZPXE7d0i1XeNZ1yiiD2WYNIfHs",
            authDomain: "chinese-learning-47f4d.firebaseapp.com",
            projectId: "chinese-learning-47f4d",
            storageBucket: "chinese-learning-47f4d.firebasestorage.app",
            messagingSenderId: "76289812052",
            appId: "1:76289812052:web:898384a916f9f341f62fc1"
        };

        const COLLECTION_NAME = 'Exam-Earth-Science'; // 更新為地科
        const DOC_GLOBAL = 'global';

        let app, db, auth;

        try {
            if (firebaseConfig.apiKey) {
                app = initializeApp(firebaseConfig);
                db = getFirestore(app);
                auth = getAuth(app);
            }
        } catch (e) {
            console.error("Firebase init failed:", e);
        }

        // ==========================================
        // 2. Data Structure (5 Categories for Earth Science)
        // ==========================================
        const generateRawData = () => {
            return [
                {
                    title: "地質與地貌篇",
                    icon: "⛰️",
                    items: [
                        { id: 1, code: "Exam-Earth-Science-1", title: "單元1：地表環境與資源", color: "#2ed573", lightColor: "#e8f5e9", icon: "🏞️", href: "Exam-Earth-Science-1.html", contents: ["➊ 地球上的水", "➋ 岩石概述", "➌ 地表營力與地質地貌"] },
                        { id: 2, code: "Exam-Earth-Science-2", title: "單元2：固體地球的變動", color: "#1e90ff", lightColor: "#e1f5fe", icon: "🌋", href: "Exam-Earth-Science-2.html", contents: ["➊ 地球內部構造與分層", "➋ 板塊構造運動", "➌ 地震", "➍ 臺灣的地質環境", "➎ 地質事件與地球歷史"] }
                    ]
                },
                {
                    title: "天文與氣象篇",
                    icon: "🌌",
                    items: [
                        { id: 3, code: "Exam-Earth-Science-3", title: "單元3：我們的宇宙", color: "#ffa502", lightColor: "#fff3e0", icon: "🔭", href: "Exam-Earth-Science-3.html", contents: ["➊ 宇宙的組成與結構", "➋ 地球的自轉與公轉", "➌ 月相、食相與潮汐"] },
                        { id: 4, code: "Exam-Earth-Science-4", title: "單元4：大氣變化", color: "#ff4757", lightColor: "#ffebee", icon: "☁️", href: "Exam-Earth-Science-4.html", contents: ["➊ 大氣的組成與結構", "➋ 天氣變化", "➌ 氣團與鋒面", "➍ 臺灣的災變天氣"] }
                    ]
                },
                {
                    title: "環境與永續篇",
                    icon: "♻️",
                    items: [
                        { id: 5, code: "Exam-Earth-Science-5", title: "單元5：永續的地球", color: "#9b59b6", lightColor: "#f3e5f5", icon: "🌏", href: "Exam-Earth-Science-5.html", contents: ["➊ 海洋與大氣的互動", "➋ 臺灣常見的天然災害", "➌ 溫室效應與全球暖化"] }
                    ]
                }
            ];
        };

        const RAW_DATA = generateRawData();
        const TOTAL_ITEMS = RAW_DATA.reduce((acc, sec) => acc + sec.items.length, 0) * 5; 

        // 輔助函式：確保取出的進度格式為長度 5 的陣列
        const getProgressArray = (progressData) => {
            if (Array.isArray(progressData)) return progressData;
            if (progressData === true) {
                const today = new Date().toISOString().split('T')[0];
                return [today, null, null, null, null];
            }
            return [null, null, null, null, null];
        };

        // ==========================================
        // 3. React Components
        // ==========================================

        const { useState, useEffect, useMemo } = React;

        const StatusLight = ({ status }) => {
            let dotClass = 'status-loading';
            let text = '☁️ 連線中...';

            if (status === 'success') {
                dotClass = 'status-success';
                text = '✅ 已同步雲端';
            } else if (status === 'error') {
                dotClass = 'status-error';
                text = '❌ 同步失敗';
            } else if (status === 'loading') {
                dotClass = 'status-loading';
                text = '⏳ 讀取資料中...';
            } else {
                dotClass = ''; 
                text = '📱 本機離線模式';
            }

            return (
                <div className="flex items-center text-xl font-black text-gray-600 bg-white px-8 py-3 rounded-full border-4 border-[#dfe6e9] shadow-[0_4px_0_#dfe6e9]">
                    <span className={`status-dot ${dotClass}`}></span>
                    {text}
                </div>
            );
        };

        const App = () => {
            // UI States
            const [currentUser, setCurrentUser] = useState(null); 
            const [allUsers, setAllUsers] = useState([]);
            const [localProgress, setLocalProgress] = useState({}); 
            const [loginName, setLoginName] = useState("");
            const [showLogin, setShowLogin] = useState(false);
            
            // 複習日曆 Modal States
            const [reviewModal, setReviewModal] = useState(null);

            // System States
            const [isAuthReady, setIsAuthReady] = useState(false);
            const [syncStatus, setSyncStatus] = useState("loading"); 

            // 計算所有完成的複習次數總和
            const completedCount = useMemo(() => {
                let count = 0;
                Object.values(localProgress).forEach(progressData => {
                    const arr = getProgressArray(progressData);
                    count += arr.filter(date => date !== null).length;
                });
                return count;
            }, [localProgress]);

            // 1. Init Auth
            useEffect(() => {
                if (!firebaseConfig.apiKey) {
                    setSyncStatus("offline");
                    const saved = localStorage.getItem('Exam-Earth-Science'); 
                    if (saved) setLocalProgress(JSON.parse(saved));
                    return;
                }

                const unsubscribeAuth = onAuthStateChanged(auth, async (user) => {
                    if (user) {
                        setIsAuthReady(true);
                    } else {
                        try {
                            // 安全地檢查是否有自定義 token
                            const hasCustomToken = typeof __initial_auth_token !== 'undefined' && __initial_auth_token !== null;
                            
                            if (hasCustomToken) {
                                await signInWithCustomToken(auth, __initial_auth_token);
                            } else {
                                await signInAnonymously(auth);
                            }
                        } catch (e) {
                            console.error("Login failed", e);
                            // 如果自定義 token 失敗，嘗試後備匿名登入
                            signInAnonymously(auth).catch(err => console.error("Anon fallback failed", err));
                        }
                    }
                });

                return () => unsubscribeAuth();
            }, []);

            // 2. Fetch Users
            useEffect(() => {
                if (!isAuthReady || !db) return;

                setSyncStatus("loading");
                const unsubGlobal = onSnapshot(doc(db, COLLECTION_NAME, DOC_GLOBAL), (docSnap) => {
                    if (docSnap.exists()) {
                        setAllUsers(docSnap.data().users || []);
                    } else {
                        setDoc(doc(db, COLLECTION_NAME, DOC_GLOBAL), { users: [] }, { merge: true });
                        setAllUsers([]);
                    }
                    if (!currentUser) setSyncStatus("success");
                }, (error) => {
                    console.error("Fetch users error:", error);
                    setSyncStatus("error");
                });

                return () => unsubGlobal();
            }, [isAuthReady, currentUser]);

            // 3. Fetch User Progress
            useEffect(() => {
                if (!currentUser || !isAuthReady || !db) return;

                setSyncStatus('loading');
                const unsubUser = onSnapshot(doc(db, COLLECTION_NAME, currentUser), (docSnap) => {
                    if (docSnap.exists()) {
                        setLocalProgress(docSnap.data().progress || {});
                    } else {
                        setLocalProgress({});
                    }
                    setSyncStatus('success');
                }, (err) => {
                    console.error("Sync progress error:", err);
                    setSyncStatus('error');
                });

                return () => unsubUser();
            }, [currentUser, isAuthReady]);

            const handleLogin = async (name) => {
                if (!name.trim()) return;
                const uname = name.trim();
                
                if (isAuthReady && db) {
                    if (!allUsers.includes(uname)) {
                        try {
                            await updateDoc(doc(db, COLLECTION_NAME, DOC_GLOBAL), {
                                users: arrayUnion(uname)
                            });
                        } catch (e) {
                            await setDoc(doc(db, COLLECTION_NAME, DOC_GLOBAL), {
                                users: arrayUnion(uname)
                            }, { merge: true });
                        }
                    }
                }
                
                setCurrentUser(uname);
                setShowLogin(false);
                setLoginName("");
            };

            const saveReviewProgress = async (code, index, dateStr) => {
                const currentArr = [...getProgressArray(localProgress[code])];
                currentArr[index] = dateStr;
                
                const newProgress = { ...localProgress, [code]: currentArr };
                setLocalProgress(newProgress);

                if (currentUser && isAuthReady && db) {
                    try {
                        setSyncStatus('loading');
                        await setDoc(doc(db, COLLECTION_NAME, currentUser), {
                            progress: newProgress,
                            lastUpdated: new Date()
                        }, { merge: true });
                        setSyncStatus('success');
                    } catch (e) {
                        console.error("Save failed:", e);
                        setSyncStatus('error');
                    }
                } else {
                    localStorage.setItem('Exam-Earth-Science', JSON.stringify(newProgress)); 
                }
                setReviewModal(null); 
            };

            const openReviewModal = (e, item, index) => {
                e.preventDefault();
                e.stopPropagation();
                const currentArr = getProgressArray(localProgress[item.code]);
                const existingDate = currentArr[index] || new Date().toISOString().split('T')[0]; 
                
                setReviewModal({
                    itemCode: item.code,
                    itemTitle: item.title,
                    color: item.color,
                    index: index,
                    date: existingDate,
                    isExisting: !!currentArr[index]
                });
            };

            return (
                <div className="max-w-[1400px] mx-auto relative px-4">
                    
                    {/* Header */}
                    <div className="header mx-auto mt-8">
                        <h1 className="animate-bounce-in">🎒 地球科學會考衝刺 🌍</h1>
                        <div className="flex flex-col items-center gap-6">
                            <p className="bg-white px-8 py-3 rounded-full border-4 border-[#ffeaa7] font-black text-[#d35400] text-2xl shadow-sm inline-block">
                                ✏️ 國中地科・主題式素養探索 📚
                            </p>
                            
                            {/* 快速登入區塊 */}
                            {!currentUser && allUsers.length > 0 && (
                                <div className="w-full max-w-3xl my-3 p-6 bg-white/70 backdrop-blur-md rounded-3xl border-4 border-pink-200 shadow-sm animate-bounce-in">
                                    <p className="text-center text-[#ff6b81] mb-5 font-black text-xl">
                                        👇 點擊你的名字快速登入 👇
                                    </p>
                                    <div className="flex flex-wrap justify-center gap-4">
                                        {allUsers.map(u => (
                                            <button 
                                                key={u} 
                                                onClick={() => handleLogin(u)} 
                                                className="quick-user-btn"
                                            >
                                                👧👦 {u}
                                            </button>
                                        ))}
                                    </div>
                                </div>
                            )}

                            {/* ---------------- 橫向按鈕區塊 ---------------- */}
                            <div className="flex flex-row flex-wrap items-center justify-center gap-5 mt-6 w-full animate-bounce-in">
                                
                                {/* 總複習進度 */}
                                <div className="text-xl font-black text-white bg-gradient-to-r from-[#ff9a9e] to-[#fecfef] px-8 py-4 rounded-full border-4 border-white shadow-[0_6px_0_#ffb8b8] flex items-center gap-3">
                                    🏆 總複習進度：{completedCount} / {TOTAL_ITEMS}
                                </div>
                                
                                {/* 連線狀態燈號 */}
                                <StatusLight status={syncStatus} />

                                {/* 登入按鈕 / 使用者狀態 */}
                                {currentUser ? (
                                    <div className="flex items-center gap-4 bg-white px-8 py-4 rounded-full border-4 border-[#55efc4] shadow-[0_4px_0_#00b894]">
                                        <span className="text-xl text-gray-500 font-bold">🚀 挑戰者：</span>
                                        <span className="font-black text-3xl text-[#00b894]">{currentUser}</span>
                                        <button 
                                            onClick={() => { setCurrentUser(null); setLocalProgress({}); }}
                                            className="bg-gray-100 hover:bg-gray-200 text-gray-600 px-5 py-2 rounded-full font-black text-lg transition ml-3"
                                        >
                                            登出 👋
                                        </button>
                                    </div>
                                ) : (
                                    <button 
                                        onClick={() => setShowLogin(true)}
                                        className="text-xl font-black text-[#0984e3] bg-white border-4 border-[#74b9ff] px-8 py-4 rounded-full hover:bg-[#e3f2fd] transition shadow-[0_6px_0_#74b9ff] hover:translate-y-1 hover:shadow-[0_2px_0_#74b9ff] flex items-center gap-3"
                                    >
                                        👑 點我登入 / 紀錄進度
                                    </button>
                                )}

                                {/* 返回按鈕 */}
                                <a 
                                    href="https://nicktsai88.github.io/List/" 
                                    className="text-xl font-black text-[#c0392b] bg-gradient-to-r from-[#ff9a9e] to-[#fecfef] px-8 py-4 rounded-full border-4 border-white shadow-[0_6px_0_#ffb8b8] transition-all hover:translate-y-1 hover:shadow-[0_2px_0_#ffb8b8] flex items-center gap-3 no-underline"
                                >
                                    🎁 返回快樂學習百寶箱
                                </a>

                            </div>
                        </div>
                    </div>

                    {/* Login Modal */}
                    {showLogin && (
                        <div className="fixed inset-0 bg-black/40 flex items-center justify-center z-50 backdrop-blur-sm" onClick={() => setShowLogin(false)}>
                            <div className="bg-white p-8 rounded-[40px] shadow-2xl w-full max-w-md mx-4 animate-bounce-in flex flex-col items-center border-4 border-[#ffb8b8]" onClick={e => e.stopPropagation()}>
                                <div className="text-6xl mb-4">👋</div>
                                <h3 className="text-3xl font-black text-center mb-6 text-[#ff6b81]">建立新挑戰者</h3>
                                <div className="flex flex-col gap-5 w-full">
                                    <input 
                                        type="text" 
                                        value={loginName}
                                        onChange={(e) => setLoginName(e.target.value)}
                                        placeholder="輸入你的名字..." 
                                        className="w-full border-4 border-gray-200 rounded-3xl px-5 py-4 text-2xl font-bold focus:outline-none focus:border-[#ff9a9e] text-center transition"
                                        onKeyDown={(e) => e.key === 'Enter' && handleLogin(loginName)}
                                    />
                                    <button 
                                        onClick={() => handleLogin(loginName)}
                                        className="w-full bg-[#ff9a9e] text-white py-4 rounded-3xl font-black text-2xl shadow-[0_8px_0_#ff7675] hover:translate-y-1 hover:shadow-[0_4px_0_#ff7675] transition"
                                    >
                                        出發！🚀
                                    </button>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* 日曆複習 Modal */}
                    {reviewModal && (
                        <div className="fixed inset-0 bg-black/40 flex items-center justify-center z-50 backdrop-blur-sm" onClick={() => setReviewModal(null)}>
                            <div className="bg-white p-8 rounded-[40px] shadow-2xl w-full max-w-md mx-4 animate-bounce-in flex flex-col items-center border-4" style={{borderColor: reviewModal.color}} onClick={e => e.stopPropagation()}>
                                <div className="text-5xl mb-3">📅</div>
                                <h3 className="text-2xl font-black text-gray-800 mb-3 text-center leading-tight">{reviewModal.itemTitle}</h3>
                                <p className="text-xl font-bold mb-8" style={{color: reviewModal.color}}>第 {reviewModal.index + 1} 次複習紀錄 ✨</p>
                                
                                <input 
                                    type="date" 
                                    value={reviewModal.date}
                                    onChange={(e) => setReviewModal({...reviewModal, date: e.target.value})}
                                    className="w-full border-4 rounded-2xl px-5 py-4 text-xl font-bold text-gray-700 focus:outline-none transition"
                                    style={{ borderColor: '#f1f2f6' }}
                                />
                                
                                <div className="flex flex-col gap-4 w-full mt-8">
                                    <button 
                                        onClick={() => saveReviewProgress(reviewModal.itemCode, reviewModal.index, reviewModal.date)}
                                        className="w-full text-white py-4 rounded-3xl font-black text-2xl transition hover:brightness-110"
                                        style={{ 
                                            backgroundColor: reviewModal.color,
                                            boxShadow: `0 8px 0 ${reviewModal.color}99`
                                        }}
                                        onMouseDown={(e) => { e.currentTarget.style.transform = 'translateY(4px)'; e.currentTarget.style.boxShadow = `0 4px 0 ${reviewModal.color}99`; }}
                                        onMouseUp={(e) => { e.currentTarget.style.transform = ''; e.currentTarget.style.boxShadow = `0 8px 0 ${reviewModal.color}99`; }}
                                    >
                                        儲存 💖
                                    </button>
                                    
                                    {reviewModal.isExisting && (
                                        <button 
                                            onClick={() => saveReviewProgress(reviewModal.itemCode, reviewModal.index, null)}
                                            className="w-full bg-white text-red-500 border-4 border-red-100 py-4 rounded-3xl font-black text-xl hover:bg-red-50 transition mt-2"
                                        >
                                            清除紀錄 🗑️
                                        </button>
                                    )}

                                    <button 
                                        onClick={() => setReviewModal(null)}
                                        className="w-full text-gray-400 py-3 rounded-3xl font-bold text-lg hover:bg-gray-100 transition mt-2"
                                    >
                                        取消返回
                                    </button>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* Content Grid */}
                    <div className="pb-20 mt-10">
                        {RAW_DATA.map((section, idx) => (
                            <div key={idx} className="mb-20">
                                <div className="section-divider-container">
                                    <div className="section-divider-line"></div>
                                    <div className="section-divider">
                                        {section.icon} {section.title} {section.icon}
                                    </div>
                                </div>
                                
                                <div className="app-grid">
                                    {section.items.map((item) => {
                                        const progressArr = getProgressArray(localProgress[item.code]);
                                        const completedReviews = progressArr.filter(date => date !== null).length;
                                        const isAllDone = completedReviews === 5;

                                        return (
                                            <a 
                                                key={item.code}
                                                href={item.href}
                                                target="_blank"
                                                className={`app-card group`}
                                                style={{
                                                    border: `5px solid ${isAllDone ? item.color : '#fff'}`, 
                                                    boxShadow: isAllDone ? `0 10px 0 ${item.color}, 0 0 35px ${item.color}66` : `0 10px 0 ${item.lightColor}`,
                                                    transform: isAllDone ? 'scale(1.02)' : 'none'
                                                }}
                                            >
                                                <div 
                                                    className="card-icon-wrapper"
                                                    style={{ 
                                                        color: item.color, 
                                                        backgroundColor: item.lightColor,
                                                        borderColor: isAllDone ? item.color : '#fff'
                                                    }}
                                                >
                                                    {item.icon}
                                                </div>
                                                
                                                <div className="card-title" style={{ color: item.color }}>
                                                    {item.title} {isAllDone && "🏆"}
                                                </div>
                                                
                                                {/* 學習內容：上下排列清單 - 加大字體 */}
                                                <div 
                                                    className="w-full mt-3 mb-6 text-left flex-grow font-bold text-gray-600 bg-gray-50 rounded-3xl p-5 border-4 border-dashed"
                                                    style={{ borderColor: item.lightColor }}
                                                >
                                                    <ul className="flex flex-col gap-3">
                                                        {item.contents.map((txt, i) => (
                                                            <li key={i} className="flex items-start gap-3 text-lg leading-snug">
                                                                <span style={{color: item.color, fontSize: '1.2em', lineHeight: '1.2'}}>✨</span>
                                                                <span>{txt}</span>
                                                            </li>
                                                        ))}
                                                    </ul>
                                                </div>
                                                
                                                {/* 5次複習區塊 - 加大 */}
                                                <div className="w-full mt-auto">
                                                    <div className="text-lg font-black mb-4 flex items-center justify-center gap-2" style={{color: item.color}}>
                                                        🔥 複習進度 ({completedReviews}/5)
                                                    </div>
                                                    <div className="flex justify-between w-full gap-3">
                                                        {[0, 1, 2, 3, 4].map(revIdx => {
                                                            const dateVal = progressArr[revIdx];
                                                            const isChecked = !!dateVal;
                                                            // 格式化顯示 (若有日期則顯示 月/日，否則顯示數字)
                                                            const displayTxt = isChecked ? dateVal.substring(5).replace('-', '/') : (revIdx + 1);

                                                            return (
                                                                <div 
                                                                    key={revIdx}
                                                                    onClick={(e) => openReviewModal(e, item, revIdx)}
                                                                    className={`flex-1 py-3 rounded-2xl flex items-center justify-center text-base font-black cursor-pointer transition-all hover:-translate-y-1`}
                                                                    style={{ 
                                                                        backgroundColor: isChecked ? item.color : '#fff',
                                                                        color: isChecked ? 'white' : '#b2bec3',
                                                                        border: `3px solid ${isChecked ? item.color : '#dfe6e9'}`,
                                                                        boxShadow: isChecked ? `0 5px 0 ${item.color}88` : `0 5px 0 #dfe6e9`
                                                                    }}
                                                                    title={isChecked ? `完成於: ${dateVal}` : `第 ${revIdx + 1} 次複習`}
                                                                >
                                                                    {displayTxt}
                                                                </div>
                                                            )
                                                        })}
                                                    </div>
                                                </div>
                                            </a>
                                        );
                                    })}
                                </div>
                            </div>
                        ))}
                    </div>

                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
